<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlipStream</title>
    <script>
      (() => {
        const defaults = {
          theme: "dark",
          accent: "red",
          density: "comfortable",
        };

        const normalize = (value) => ({
          theme: value && (value.theme === "light" || value.theme === "dark")
            ? value.theme
            : defaults.theme,
          accent: value && (value.accent === "red" || value.accent === "blue" || value.accent === "green" || value.accent === "gold" || value.accent === "purple" || value.accent === "pink")
            ? value.accent
            : defaults.accent,
          density: value && (value.density === "compact" || value.density === "comfortable")
            ? value.density
            : defaults.density,
        });

        const apply = (appearance) => {
          document.documentElement.dataset.theme = appearance.theme;
          document.documentElement.dataset.accent = appearance.accent;
          document.documentElement.dataset.density = appearance.density;
          delete document.documentElement.dataset.motion;
        };

        try {
          const storedAppearance = window.localStorage.getItem("slipstream-appearance");
          if (storedAppearance) {
            apply(normalize(JSON.parse(storedAppearance)));
            return;
          }

          const legacyTheme = window.localStorage.getItem("slipstream-theme");
          apply(
            normalize({
              theme: legacyTheme === "light" || legacyTheme === "dark"
                ? legacyTheme
                : defaults.theme,
            }),
          );
        } catch {
          apply(defaults);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
